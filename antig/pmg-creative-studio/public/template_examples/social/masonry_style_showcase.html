    <script>
        function exitHandler(e) {
            console.log('Exit handler triggered', e);
        }

        function enablerInitHandler() {
            // Ensure Enabler is initialized before setting up interactions
            document.getElementById('base').addEventListener('click', exitHandler, false);
            createContent();
        }

        window.onload = function () {
            if (typeof Enabler !== 'undefined' && Enabler.isInitialized()) {
                enablerInitHandler();
            } else if (typeof Enabler !== 'undefined') {
                Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitHandler);
            } else {
                console.error('Enabler is not defined. Ensure the Enabler.js script is included.');
            }
        };

        function createContent() {
            if (typeof Enabler === 'undefined') {
                console.error('Enabler is not available.');
                return;
            }
            populateContent();
        }
        function populateContent() {
            if (typeof dynamicContent === 'undefined') {
                console.error('dynamicContent is not available.');
                return;
            }

            var select = function (s) {
                return document.querySelector(s);
            };

            var logo = select('#logo'),
                image1 = select('#img1'),
                headline1 = select('#headline'),
                opacity = select('#opacity'),
                dc = dynamicContent.Social_Dynamic_Custom_Input_Tracker_Sample_Studio_Input_[0];


            logo.src = dc.logo;
            image1.src = dc.image1;
            headline1.innerHTML = dc.headline1;
            const obj = (new Function(`return ${dc.custom_input_1}`))();
            Object.assign(opacity.style, obj);
            opacity.style.backgroundColor = dc.background_color;

            function fitTextToWidth(elementClass, maxWidth, maxFontSize) {
                const element = document.querySelector(`.${elementClass}`);
                const testSpan = document.createElement('span');

                testSpan.style.font = window.getComputedStyle(element).font;
                testSpan.style.visibility = 'hidden';
                testSpan.style.whiteSpace = 'nowrap';
                document.body.appendChild(testSpan);

                let fontSize = maxFontSize;
                testSpan.innerText = element.innerText;

                while (fontSize > 20) {
                    testSpan.style.fontSize = fontSize + 'px';
                    if (testSpan.offsetWidth <= maxWidth) break;
                    fontSize -= 1;
                }

                element.style.fontSize = fontSize + 'px';
                document.body.removeChild(testSpan);
            }
            fitTextToWidth("headline-here", 785, 100);
        }
    </script>
